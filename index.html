<!doctype html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moderni Sudoku</title>
  <style>
    :root {
      --bg: #f0f2f5;
      --card: #ffffff;
      --line: #d1d5db;
      --line-strong: #374151;
      --text: #1f2937;
      --primary: #3b82f6;
      --error: #ef4444;
      --fixed-bg: #f9fafb;
      --selected: #dbeafe;
      --related: #eff6ff;
      --same-num: #bfdbfe;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 10px;
    }

    .app {
      width: min(100%, 500px);
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .header { text-align: center; margin-bottom: 20px; }
    h1 { margin: 0; font-size: 1.8rem; letter-spacing: -0.025em; }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    .row { display: flex; gap: 8px; align-items: center; justify-content: center; flex-wrap: wrap; }

    button, select {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.9rem;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover { background: #f3f4f6; }
    button.primary { background: var(--primary); color: white; border-color: var(--primary); font-weight: 600; }
    button.primary:hover { opacity: 0.9; }

    .board {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 3px solid var(--line-strong);
      background: var(--line-strong);
      gap: 1px;
    }

    .cell {
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.1rem, 5vw, 1.6rem);
      cursor: pointer;
      background: white;
      transition: background 0.1s;
      outline: none;
    }

    .cell.block-right { border-right: 3px solid var(--line-strong); }
    .cell.block-bottom { border-bottom: 3px solid var(--line-strong); }

    .cell.fixed { background: var(--fixed-bg); font-weight: 800; color: #111827; }
    .cell.selected { background: var(--selected) !important; }
    .cell.related { background: var(--related); }
    .cell.same-num { background: var(--same-num); }
    .cell.error { color: var(--error); }

    .numpad {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .status {
      text-align: center;
      margin-top: 15px;
      font-size: 0.9rem;
      font-weight: 500;
      height: 1.2rem;
    }

    @media (max-width: 400px) {
      .numpad { grid-template-columns: repeat(5, 1fr); }
      .numpad button { padding: 12px 5px; }
    }
  </style>
</head>
<body>

<main class="app">
  <div class="header">
    <h1>Sudoku</h1>
  </div>

  <section class="controls">
    <div class="row">
      <select id="difficulty">
        <option value="easy">Helppo (40)</option>
        <option value="medium" selected>Keskitaso (32)</option>
        <option value="hard">Vaikea (24)</option>
      </select>
      <button id="newGame" class="primary">Uusi peli</button>
    </div>
    <div class="row">
      <button id="check">Tarkista</button>
      <button id="clear">Tyhjennä</button>
    </div>
  </section>

  <section id="board" class="board"></section>

  <section class="numpad">
    <button data-num="1">1</button>
    <button data-num="2">2</button>
    <button data-num="3">3</button>
    <button data-num="4">4</button>
    <button data-num="5">5</button>
    <button data-num="6">6</button>
    <button data-num="7">7</button>
    <button data-num="8">8</button>
    <button data-num="9">9</button>
    <button data-num="0">✖</button>
  </section>

  <div id="status" class="status"></div>
</main>

<script>
  const boardEl = document.getElementById('board');
  const difficultyEl = document.getElementById('difficulty');
  const statusEl = document.getElementById('status');

  let solution = [], puzzle = [], player = [], selected = null;
  const cellElements = [];

  // Alustetaan DOM-solut kerran
  function initDOM() {
    boardEl.innerHTML = '';
    for (let r = 0; r < 9; r++) {
      for (let c = 0; c < 9; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        if ((c + 1) % 3 === 0 && c < 8) cell.classList.add('block-right');
        if ((r + 1) % 3 === 0 && r < 8) cell.classList.add('block-bottom');

        cell.onclick = () => selectCell(r, c);
        boardEl.appendChild(cell);
        cellElements.push(cell);
      }
    }
  }

  function selectCell(r, c) {
    selected = { r, c };
    updateVisuals();
  }

  function updateVisuals() {
    const selVal = selected ? player[selected.r][selected.c] : null;

    cellElements.forEach((el, i) => {
      const r = Math.floor(i / 9);
      const c = i % 9;
      const val = player[r][c];

      el.textContent = val === 0 ? '' : val;
      el.className = 'cell';
      if ((c + 1) % 3 === 0 && c < 8) el.classList.add('block-right');
      if ((r + 1) % 3 === 0 && r < 8) el.classList.add('block-bottom');

      if (puzzle[r][c] !== 0) el.classList.add('fixed');
      if (selected) {
        // FIX: selected.col -> selected.c
        if (r === selected.r && c === selected.c) {
          el.classList.add('selected');
        } else if (
          r === selected.r ||
          c === selected.c ||
          (Math.floor(r / 3) === Math.floor(selected.r / 3) &&
           Math.floor(c / 3) === Math.floor(selected.c / 3))
        ) {
          el.classList.add('related');
        }
        if (val !== 0 && val === selVal) el.classList.add('same-num');
      }
      if (val !== 0 && puzzle[r][c] === 0 && val !== solution[r][c]) el.classList.add('error');
    });
  }

  // --- Pelilogiikka ---

  function isValid(grid, r, c, num) {
    for (let i = 0; i < 9; i++) if (grid[r][i] === num || grid[i][c] === num) return false;
    const sr = Math.floor(r / 3) * 3, sc = Math.floor(c / 3) * 3;
    for (let i = 0; i < 3; i++) for (let j = 0; j < 3; j++) if (grid[sr + i][sc + j] === num) return false;
    return true;
  }

  function fill(grid) {
    for (let r = 0; r < 9; r++) {
      for (let c = 0; c < 9; c++) {
        if (grid[r][c] === 0) {
          const nums = [1, 2, 3, 4, 5, 6, 7, 8, 9].sort(() => Math.random() - 0.5);
          for (let n of nums) {
            if (isValid(grid, r, c, n)) {
              grid[r][c] = n;
              if (fill(grid)) return true;
              grid[r][c] = 0;
            }
          }
          return false;
        }
      }
    }
    return true;
  }

  // Uniqueness-tarkistus: laskee ratkaisujen määrän (pysähtyy kun löytyy >1)
  function countSolutions(grid, limit) {
    for (let r = 0; r < 9; r++) {
      for (let c = 0; c < 9; c++) {
        if (grid[r][c] === 0) {
          let count = 0;
          for (let n = 1; n <= 9; n++) {
            if (isValid(grid, r, c, n)) {
              grid[r][c] = n;
              count += countSolutions(grid, limit - count);
              grid[r][c] = 0;
              if (count >= limit) return count;
            }
          }
          return count;
        }
      }
    }
    return 1; // Kaikki täytetty = yksi ratkaisu löytyi
  }

  function startNewGame() {
    statusEl.textContent = 'Generoidaan...';
    statusEl.style.color = ''; // FIX: nollataan väri
    setTimeout(() => {
      const full = Array.from({ length: 9 }, () => Array(9).fill(0));
      fill(full);
      solution = full.map(r => [...r]);

      // FIX: vihjemäärät vastaavat nyt valikon tekstejä
      const clues = { easy: 40, medium: 32, hard: 24 }[difficultyEl.value];
      const toRemove = 81 - clues;

      puzzle = full.map(r => [...r]);

      // FIX: sekoitettu indeksilista – ei turhia osumia jo tyhjennettyihin ruutuihin
      const indices = [];
      for (let i = 0; i < 81; i++) indices.push(i);
      shuffle(indices);

      let removed = 0;
      for (let idx = 0; idx < indices.length && removed < toRemove; idx++) {
        const r = Math.floor(indices[idx] / 9);
        const c = indices[idx] % 9;
        const backup = puzzle[r][c];
        puzzle[r][c] = 0;

        // FIX: uniqueness-tarkistus – varmistetaan että ratkaisu pysyy uniikkina
        if (countSolutions(puzzle.map(row => [...row]), 2) === 1) {
          removed++;
        } else {
          puzzle[r][c] = backup; // Palautetaan jos useampi ratkaisu
        }
      }

      player = puzzle.map(r => [...r]);
      selected = null;
      updateVisuals();
      statusEl.textContent = '';
    }, 50);
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
  }

  // --- Kontrollit ---

  window.addEventListener('keydown', (e) => {
    if (!selected) return;
    if (e.key >= '1' && e.key <= '9') setNum(parseInt(e.key));
    if (e.key === '0' || e.key === 'Backspace' || e.key === 'Delete') setNum(0);

    if (e.key === 'ArrowUp') { e.preventDefault(); selectCell(Math.max(0, selected.r - 1), selected.c); }
    if (e.key === 'ArrowDown') { e.preventDefault(); selectCell(Math.min(8, selected.r + 1), selected.c); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); selectCell(selected.r, Math.max(0, selected.c - 1)); }
    if (e.key === 'ArrowRight') { e.preventDefault(); selectCell(selected.r, Math.min(8, selected.c + 1)); }
  });

  function setNum(n) {
    if (selected && puzzle[selected.r][selected.c] === 0) {
      player[selected.r][selected.c] = n;
      updateVisuals();
    }
  }

  document.querySelector('.numpad').onclick = (e) => {
    if (e.target.dataset.num) setNum(parseInt(e.target.dataset.num));
  };

  document.getElementById('newGame').onclick = startNewGame;
  document.getElementById('clear').onclick = () => {
    player = puzzle.map(r => [...r]);
    statusEl.textContent = '';
    statusEl.style.color = ''; // FIX: nollataan väri myös tyhjennettäessä
    updateVisuals();
  };
  document.getElementById('check').onclick = () => {
    const win = player.every((row, r) => row.every((v, c) => v === solution[r][c]));
    statusEl.textContent = win ? 'Loistavaa! Kaikki oikein! 🎉' : 'Vielä löytyy virheitä tai tyhjiä ruutuja.';
    statusEl.style.color = win ? 'green' : 'red';
  };

  initDOM();
  startNewGame();
</script>
</body>
</html>
